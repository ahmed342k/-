<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد طبي</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:420px;
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#1877f2;
margin-bottom:5px;
}

p{
text-align:center;
color:#666;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

input:focus{
border-color:#1877f2;
box-shadow:0 0 5px rgba(24,119,242,0.3);
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d5bd7;
}

.success{
text-align:center;
color:green;
margin-top:10px;
font-weight:bold;
}

.error{
text-align:center;
color:red;
margin-top:10px;
font-weight:bold;
}

small{
display:block;
text-align:center;
margin-top:10px;
color:#888;
}
</style>
</head>

<body>

<div class="card">
<h1>حجز موعد طبي</h1>
<p>املأ البيانات وسيصلك تأكيد فوري</p>

<form id="form">

<input type="text" id="name" placeholder="الاسم الثلاثي" required>
<input type="tel" id="phone" placeholder="رقم الهاتف" required>
<input type="email" id="email" placeholder="الإيميل" required>
<input type="datetime-local" id="time" required>

<button type="submit">حجز الموعد</button>

<div id="msg"></div>

</form>

<small>الإرسال يتم مباشرة بدون مغادرة الصفحة</small>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_PUBLIC_KEY"); // بدّلها بمفتاحك

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let params = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
time: document.getElementById("time").value
};

emailjs.send("YOUR_SERVICE_ID", "template_1nyqqnf", params)
.then(() => {
document.getElementById("msg").innerHTML =
"<div class='success'>تم إرسال الحجز بنجاح ✓</div>";
document.getElementById("form").reset();
})
.catch((error) => {
console.log(error);
document.getElementById("msg").innerHTML =
"<div class='error'>فشل الإرسال، تأكد من الإعدادات</div>";
});

});
</script>

</body>
  </html>
