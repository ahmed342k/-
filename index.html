<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد طبيب</title>
    <style>
        /* إعدادات الخطوط والخلفية الأساسية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* منع الوميض الافتراضي على الهواتف */
        }

        body {
            /* خلفية متدرجة تبرز جمالية وشفافية التصميم الزجاجي */
            background: linear-gradient(135deg, #1f4068 0%, #162447 50%, #0f1a1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* حاوية النموذج - تأثير الزجاج الشفاف (Glassmorphism) */
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px) saturate(130%);
            -webkit-backdrop-filter: blur(18px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 35px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-header h2 {
            color: #ffffff;
            font-size: 25px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .form-header p {
            color: #b0bccc;
            font-size: 14px;
            line-height: 1.5;
        }

        /* مجموعات الإدخال */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            padding-right: 4px;
        }

        /* مدخلات نصية زجاجية شفافة وناعمة */
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            /* حركات سلسة للغاية عند التفاعل */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* عند التركيز على الحقل */
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* حظر وحذف الظلال والحواف الزرقاء الافتراضية نهائياً عند الضغط */
        input:focus, button:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        /* زر الإرسال الزجاجي الشفاف فائق السلاسة */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            /* تأثير الانتقال والانزلاق فائق النعومة والسلاسة */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 10px;
        }

        /* تأثير حركي سلس عند تمرير المؤشر فوق الزر */
        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* انسيابية فوريّة ومريحة عند النقر الفعلي للزر */
        .submit-btn:active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(1px);
        }

        /* حالة تعطيل الزر أثناء المعالجة والإرسال */
        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            transform: none;
        }

        /* بطاقة نجاح الإرسال الزجاجية */
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(46, 204, 113, 0.12);
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 14px;
            color: #2ecc71;
            font-size: 15px;
            font-weight: 600;
            margin-top: 15px;
            backdrop-filter: blur(8px);
            animation: slideIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>حجز موعد طبيب</h2>
            <p>أدخل بياناتك بدقة لتأكيد موعدك، وسيتم إرسالها فوراً إلى العيادة</p>
        </div>

        <form id="appointmentForm">
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            <input type="hidden" name="subject" value="طلب حجز موعد جديد من العيادة">
            <input type="hidden" name="from_name" value="موقع العيادة الرقمية">

            <div class="input-group">
                <label for="name">الاسم الكامل</label>
                <input type="text" id="name" name="اسم_الزبون" placeholder="أدخل اسمك الثلاثي" required>
            </div>

            <div class="input-group">
                <label for="email">البريد الإلكتروني للزبون</label>
                <input type="email" id="email" name="إيميل_الزبون" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="age">العمر</label>
                <input type="number" id="age" name="العمر" placeholder="مثال: 24" min="1" max="110" required>
            </div>

            <div class="input-group">
                <label for="weight">الوزن (كجم)</label>
                <input type="number" id="weight" name="الوزن" placeholder="مثال: 68" min="1" max="250" required>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">إرسال وتأكيد الموعد</button>
        </form>

        <div id="successMessage" class="success-message">
            تم إرسال حجزك بنجاح وبسرعة! شكراً لك، سنقوم بالتواصل معك قريباً.
        </div>
    </div>

    <script>
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault(); // منع الصفحة من الانتقال أو التحديث لتجربة مستخدم صامتة وسلسة
            
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const successMessage = document.getElementById('successMessage');
            
            // تحويل حالة الزر فوراً لإظهار استجابة ناعمة وسلسة للزبون
            submitBtn.disabled = true;
            submitBtn.innerText = 'جاري إرسال البيانات...';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            // استخدام واجهة API المباشرة المتوافقة تماماً مع GitHub Pages و AJAX
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (response.status == 200) {
                    // إخفاء الحقول وإظهار رسالة النجاح في نفس الصفحة بسلاسة فائقة
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    console.log(response);
                    alert('حدث خطأ: ' + res.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'إرسال وتأكيد الموعد';
                }
            })
            .catch(error => {
                console.log(error);
                alert('تعذر الإرسال، يرجى التحقق من اتصال الإنترنت.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'إرسال وتأكيد الموعد';
            });
        });
    </script>

</body>
</html>
